# ⚠️  Change all values before deploying to production.
# Generate base64: echo -n 'your-value' | base64
#
#   DB_PASSWORD      → postgres
#   JWT_SECRET_KEY   → change-this-jwt-secret-in-prod
#   DJANGO_SECRET_KEY (auth)   → auth-django-secret-key
#   DJANGO_SECRET_KEY (exam)   → exam-django-secret-key
#   DJANGO_SECRET_KEY (result) → result-django-secret-key

apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: exam-app
type: Opaque
data:
  password: cG9zdGdyZXM=       # postgres

---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: exam-app
type: Opaque
data:
  key: Y2hhbmdlLXRoaXMtand0LXNlY3JldC1pbi1wcm9k   # change-this-jwt-secret-in-prod

---
apiVersion: v1
kind: Secret
metadata:
  name: django-secrets
  namespace: exam-app
type: Opaque
data:
  auth-secret-key:   YXV0aC1kamFuZ28tc2VjcmV0LWtleQ==    # auth-django-secret-key
  exam-secret-key:   ZXhhbS1kamFuZ28tc2VjcmV0LWtleQ==    # exam-django-secret-key
  result-secret-key: cmVzdWx0LWRqYW5nby1zZWNyZXQta2V5   # result-django-secret-key

